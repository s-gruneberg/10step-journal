<!doctype html>
<html lang="en">

<head>
  <!-- CRITICAL: Set theme before anything else -->
  <script>
    // Version parameter for cache busting
    const THEME_VERSION = '1.0.0';

    try {
      // Check localStorage first for user preference
      const journalData = JSON.parse(localStorage.getItem('10StepJournal.JournalData') || '{}');
      const storedTheme = journalData.darkMode;

      let shouldUseDarkMode = false;
      if (storedTheme === 'dark') {
        shouldUseDarkMode = true;
      } else if (storedTheme === 'light') {
        shouldUseDarkMode = false;
      } else {
        // Use system preference if no stored preference
        shouldUseDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      if (shouldUseDarkMode) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.add('light');
      }
    } catch (e) {
      // Fallback to system preference
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.add('light');
      }
    }
  </script>
